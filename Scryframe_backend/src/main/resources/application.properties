spring.application.name=Scryframe

# --- Image storage (on-disk) ---
# Folder where uploaded image bytes are persisted. Created at startup if missing.
scryframe.storage.path=../storage

# --- DeepDanbooru integration ---
# Path to the DeepDanbooru project (model + tags files).
scryframe.deepdanbooru.project-path=./model

# --- Multipart upload limits ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
