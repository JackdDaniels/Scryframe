spring.application.name=Scryframe

# --- Image storage (on-disk) ---
# Folder where uploaded image bytes are persisted. Created at startup if missing.
scryframe.storage.path=../storage

# --- DeepDanbooru integration ---
# Path to the DeepDanbooru project (model + tags files).
scryframe.deepdanbooru.project-path=./model

# --- Multipart upload limits ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# --- Swagger Open-API tools ---
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.packages-to-scan=jorgedediego.scryframe.infrastructure.rest

# --- Postgres database ---
spring.datasource.url= ${DATABASE_URL:jdbc:postgresql://localhost:5433/scryframe_db}
spring.datasource.username= ${DATABASE_USERNAME:postgres}
spring.datasource.password= ${DATABASE_PASSWORD:postgres_password}
spring.datasource.driver-class-name= org.postgresql.Driver

spring.jpa.database-platform= org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto= update
spring.jpa.show-sql= true
spring.jpa.properties.hibernate.format_sql= true